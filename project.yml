name: SportsDashboard
options:
  bundleIdPrefix: com.curara
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SportsDashboard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOSApp
        type: group
      - path: Shared
        type: group
      - path: WatchApp/Views/RacePredictionView.swift
      - path: WatchApp/Views/TrainingHistoryView.swift
      - path: WatchApp/Views/WorkoutRouteView.swift
      - path: WatchApp/Views/HRZonesView.swift
      - path: WatchApp/Views/WeeklyTrendView.swift
      - path: WatchApp/Views/RunningDynamicsView.swift
      - path: WatchApp/Views/FlyoverReplayView.swift
      - path: WatchApp/ViewModels/DashboardViewModel.swift
    settings:
      base:
        INFOPLIST_FILE: iOSApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.curara.SportsDashboard
        PRODUCT_NAME: SportsDashboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GFJK8DP9ZC
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: iOSApp/SportsDashboard.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: HealthKit.framework
      - sdk: SwiftData.framework
      - sdk: Charts.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: WatchConnectivity.framework

  SportsDashboard Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
        type: group
      - path: Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: WatchApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchApp/SportsDashboard.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.curara.SportsDashboard.watchkitapp
        PRODUCT_NAME: SportsDashboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: false
        INSTALL_PATH: "$(LOCAL_APPS_DIR)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GFJK8DP9ZC
    entitlements:
      path: WatchApp/SportsDashboard.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: HealthKit.framework
      - sdk: SwiftData.framework
      - sdk: Charts.framework
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
      - sdk: WatchConnectivity.framework
